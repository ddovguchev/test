source = /home/levi/.config/niku/configs/hypr/colors/hyprlock-color.conf
$Scripts = $HOME/.config/niku/scripts/bash

$font_family = SF Pro Display

general {
    fractional_scaling = 2
    immediate_render = true
}

background {
    monitor =
    path = $image
    color = rgb(0,0,0)
    blur_size = 3
    blur_passes = 3 
    noise = 0.0117
    contrast = 1.3000 
    brightness = 0.6000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}


# Hours
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H") </big></b>"
    color = $on_secondary_container
    font_size = 112
    font_family = Google Sans Flex
    shadow_passes = 0
    shadow_size = 0
    position = 0, 220
    halign = center
    valign = center
}

# Minutes
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%M") </big></b>"
    color = $on_secondary_container
    font_size = 112
    font_family = Google Sans Flex
    shadow_passes = 0
    shadow_size = 0
    position = 0, 80
    halign = center
    valign = center
}

# Today
label {
    monitor =
    text = cmd[update:18000000] echo "<b><big> "$(date +'%A')" </big></b>"
    color = $secondary
    font_size = 18
    font_family = $font_family
    position = 0, -15
    halign = center
    valign = center
}

# Week
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%d %b')" </b>"
    color = $secondary
    font_size = 14
    font_family = $font_family
    position = 0, -40
    halign = center
    valign = center
}

label { # Caps Lock Warning
    monitor =
    text = cmd[update:250] $HOME/.config/niku/configs/hypr/scripts/hyprlock/check-capslock.sh
    color = $secondary
    font_size = 13
    font_family = Google Sans Flex
    position = 0, -70
    halign = center
    valign = center
}

label { # Status
    monitor =
    text = cmd[update:5000] $HOME/.config/niku/configs/hypr/scripts/hyprlock/status.sh
    color = $secondary
    font_size = 14
    font_family = $font_family
    position = 0, -100
    halign = left
    valign = top
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.26 
    dots_spacing = 0.64 
    dots_center = true
    rounding = 22
    outer_color = $surface
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = $error
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
	font_family = Google Sans Flex
    position = 0, 120
    halign = center
    valign = bottom
}